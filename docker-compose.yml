services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: validator_api
    restart: always
    ports:
      - "3000:3000"
    # This pulls variables from your .env file in the root
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: validator_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: your_secure_password
      MYSQL_DATABASE: validator_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pyour_secure_password"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data: