version: "3.9"

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: validator_api
    restart: always
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # If you prefer to keep REDIS_URL in .env, omit this block
    environment:
      - REDIS_URL=redis://redis:6379

  db:
    image: mysql:8.0
    container_name: validator_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: your_secure_password
      MYSQL_DATABASE: validator_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pyour_secure_password"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: validator_redis
    restart: always
    ports:
      - "6379:6379" # optional; remove if you don’t need host access
    command: ["redis-server", "--save", "", "--appendonly", "no"] # simple, no persistence

volumes:
  db_data: